[platformio]
default_envs = esp32dev

; espressif32 6.x targets arduino-esp32 2.x, which uses the legacy timer API:
;   timerBegin(num, divider, countUp) / timerAlarmWrite() / timerAlarmEnable()
; arduino-esp32 3.x changed this API — pin the platform to stay compatible.
[env:esp32dev]
platform  = espressif32@6.10.0
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600
test_framework = unity

; Native env: runs test/test_main/ on the host PC (no ESP32 required).
; Mock headers in test/test_main/ intercept <Arduino.h> and <driver/gpio.h>.
; lib_ldf_mode = off prevents auto-linking robot_drivers (test_main.cpp
; includes the .cpp files directly after the mocks are in scope).
[env:native]
platform       = native
test_framework = unity
build_flags    = -I test/test_main  ; mock Arduino.h intercepts <Arduino.h> for native build
test_filter    = test_main          ; test_stepper / test_servo require real hardware
